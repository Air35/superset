# Versão do superset. Lembrar que é baseada na TAG da imagem do dockerhub.
SUPERSET_VERSION=superset_version

# Permitir os scripts python de printarem no console de logs do compose.
PYTHONUNBUFFERED=1

COMPOSE_PROJECT_NAME=superset_cliente
DEV_MODE=false

# Configurações do banco de dados (container do superset)
DATABASE_DB=superset
DATABASE_HOST=db
DATABASE_PASSWORD=superset_db_password
DATABASE_USER=superset
DATABASE_PORT=5432
DATABASE_DIALECT=postgresql

# Configurações do banco de dados (container do psql)
POSTGRES_DB=superset
POSTGRES_USER=superset
POSTGRES_PASSWORD=superset_db_password

# Configurações do redis
REDIS_HOST=redis
REDIS_PORT=6379

# Configurações de depuração
# FLASK_DEBUG: Enables Flask dev features (auto-reload, better error pages) - keep 'true' for development
FLASK_DEBUG=false
# SUPERSET_LOG_LEVEL: Controls Superset application logging verbosity (debug, info, warning, error, critical)
SUPERSET_LOG_LEVEL=info

SUPERSET_APP_ROOT="/"
SUPERSET_ENV=production
SUPERSET_LOAD_EXAMPLES=no
CYPRESS_CONFIG=false
SUPERSET_PORT=8088
MAPBOX_API_KEY=''

SUPERSET_SECRET_KEY=SUPERSET_SUPER_SECRET_KEY
ENABLE_PLAYWRIGHT=false
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
BUILD_SUPERSET_FRONTEND_IN_DOCKER=true

SUPERSET_LANGUAGE=pt_BR

# IDs de usuário e grupo que serão mapeadas para o serviço do superset no container.
UID=user_uid
GID=user_gid
